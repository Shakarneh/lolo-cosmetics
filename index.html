<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- الخطوط: preconnect + link بدل @import داخل CSS (أسرع بـ~ثانية حسب Lighthouse) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap"
    />
    <!-- صورة الهيرو هي أكبر عنصر مرئي (LCP) — تحميل مبكر بأولوية عالية -->
    <link rel="preload" as="image" href="/images/hero-poster.jpg" fetchpriority="high" />
    <meta
      name="description"
      content="لولو كوزمتكس — متجر مستحضرات تجميل وعناية شخصية: مكياج، عناية بالبشرة والجسم والشعر، عطور ومستلزمات. جودة عالية وأسعار مناسبة، توصيل للضفة والقدس. اطلب عبر واتساب."
    />
    <meta
      name="keywords"
      content="لولو كوزمتكس, لولو, مكياج, عناية بالبشرة, عناية بالجسم, عطور, مستحضرات تجميل, فلسطين, Lolo Cosmetics"
    />
    <link rel="canonical" href="https://lolocosmetics.shop/" />
    <meta name="theme-color" content="#FAF0E8" />
    <!-- روابط المشاركة: واتساب / فيسبوك / انستغرام تعرض هذه البطاقة -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="لولو كوزمتكس | Lolo Cosmetics" />
    <meta property="og:title" content="لولو كوزمتكس | Lolo Cosmetics" />
    <meta
      property="og:description"
      content="إطلالتك اليومية تبدأ من هنا 🌸 جودة عالية | عناية فاخرة | أسعار مناسبة — توصيل للضفة والقدس."
    />
    <meta property="og:url" content="https://lolocosmetics.shop/" />
    <meta property="og:image" content="https://lolocosmetics.shop/images/hero-poster.jpg" />
    <meta property="og:locale" content="ar_PS" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>لولو كوزمتكس | Lolo Cosmetics</title>
  </head>
